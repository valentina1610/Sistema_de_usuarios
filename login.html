<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
      :root {
        --rosa: #f472b6;
        --rosa-claro: #fce7f3;
        --rosa-oscuro: #db2777;
        --crema: #fff7f0;
        --texto: #1e1e2e;
      }
      * {
        box-sizing: border-box;
      }
      body {
        background: var(--crema);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image:
          radial-gradient(circle at 20% 20%, #fce7f3 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, #fdf2f8 0%, transparent 50%);
      }
      .card-login {
        background: white;
        border-radius: 24px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 8px 40px rgba(244, 114, 182, 0.15);
        border: 1px solid #fce7f3;
        animation: fadeUp 0.5s ease;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .titulo {
        font-family: "Playfair Display", serif;
        color: var(--texto);
        font-size: 2rem;
        margin-bottom: 4px;
      }
      .subtitulo {
        color: #9ca3af;
        font-size: 0.9rem;
        margin-bottom: 28px;
      }
      .form-label {
        font-weight: 500;
        font-size: 0.85rem;
        color: var(--texto);
        margin-bottom: 6px;
      }
      .form-control {
        border: 1.5px solid #e5e7eb;
        border-radius: 12px;
        padding: 11px 14px;
        font-size: 0.92rem;
        transition: all 0.2s;
        background: #fafafa;
      }
      .form-control:focus {
        border-color: var(--rosa);
        box-shadow: 0 0 0 3px rgba(244, 114, 182, 0.15);
        background: white;
      }
      .btn-login {
        background: linear-gradient(135deg, var(--rosa), var(--rosa-oscuro));
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
        font-size: 0.95rem;
        width: 100%;
        transition: all 0.2s;
        margin-top: 4px;
      }
      .btn-login:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(219, 39, 119, 0.3);
        color: white;
      }
      .link-rosa {
        color: var(--rosa-oscuro);
        text-decoration: none;
        font-weight: 500;
      }
      .link-rosa:hover {
        color: var(--rosa);
        text-decoration: underline;
      }
      .form-check-input:checked {
        background-color: var(--rosa);
        border-color: var(--rosa);
      }
      .punto {
        width: 8px;
        height: 8px;
        background: var(--rosa);
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
      }
    </style>
  </head>
  <body>
    <div class="card-login">
      <div id="mensajeLogin"></div>
      <span class="punto"></span
      ><span style="font-size: 0.8rem; color: #9ca3af; font-weight: 500"
        >BIENVENIDO/A</span
      >
      <h1 class="titulo mt-1">Iniciar sesión</h1>
      <p class="subtitulo">Ingresá tus datos para continuar</p>

      <form id="formLogin">
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input
            type="text"
            id="usuario"
            name="usuario"
            class="form-control"
            placeholder="tu_usuario"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input
            type="password"
            id="clave"
            name="clave"
            class="form-control"
            placeholder="••••••••"
            required
          />
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input type="checkbox" id="recordarme" class="form-check-input" />
            <label
              for="recordarme"
              class="form-check-label"
              style="font-size: 0.85rem"
              >Recordarme</label
            >
          </div>
          <a href="recuperacion.html" class="link-rosa" style="font-size: 0.85rem"
            >¿Olvidaste tu clave?</a
          >
        </div>
        <button type="submit" class="btn-login">Entrar</button>
      </form>

      <p
        class="text-center mt-4 mb-0"
        style="font-size: 0.88rem; color: #9ca3af"
      >
        ¿No tenés cuenta?
        <a href="registro.html" class="link-rosa">Registrate aquí</a>
      </p>
    </div>

    <script>
      const usuarioGuardado = localStorage.getItem("recordar_usuario");
      if (usuarioGuardado) {
        $("#usuario").val(usuarioGuardado);
        $("#recordarme").prop("checked", true);
      }

      $("#formLogin").submit(function (e) {
        e.preventDefault();
        const usuario = $("#usuario").val();
        const clave = $("#clave").val();
        const recordar = $("#recordarme").is(":checked");

        if (recordar) {
          localStorage.setItem("recordar_usuario", usuario);
        } else {
          localStorage.removeItem("recordar_usuario");
        }

        $.post("sistema/login.php", { usuario, clave }, function (rta) {
          if (rta.code === 200) {
            $("#mensajeLogin").html(
              `<div class="alert alert-success rounded-3 py-2">¡Bienvenida, ${rta.msg}! 🌸</div>`,
            );
            setTimeout(() => {
              window.location.href = "dashboard.php";
            }, 1000);
          } else {
            $("#mensajeLogin").html(
              `<div class="alert alert-danger rounded-3 py-2">${rta.msg}</div>`,
            );
          }
        });
      });
    </script>
  </body>
</html>
