<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar cuenta</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
      :root {
        --rosa: #f472b6;
        --rosa-oscuro: #db2777;
        --crema: #fff7f0;
      }
      body {
        background: var(--crema);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: radial-gradient(
          circle at 70% 30%,
          #fce7f3 0%,
          transparent 50%
        );
      }
      .card-login {
        background: white;
        border-radius: 24px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 8px 40px rgba(244, 114, 182, 0.15);
        border: 1px solid #fce7f3;
        animation: fadeUp 0.5s ease;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .titulo {
        font-family: "Playfair Display", serif;
        color: #1e1e2e;
        font-size: 2rem;
        margin-bottom: 4px;
      }
      .subtitulo {
        color: #9ca3af;
        font-size: 0.9rem;
        margin-bottom: 28px;
      }
      .form-label {
        font-weight: 500;
        font-size: 0.85rem;
        color: #1e1e2e;
      }
      .form-control,
      .form-select {
        border: 1.5px solid #e5e7eb;
        border-radius: 12px;
        padding: 11px 14px;
        font-size: 0.92rem;
        background: #fafafa;
        transition: all 0.2s;
      }
      .form-control:focus,
      .form-select:focus {
        border-color: var(--rosa);
        box-shadow: 0 0 0 3px rgba(244, 114, 182, 0.15);
        background: white;
      }
      .btn-primary-rosa {
        background: linear-gradient(135deg, var(--rosa), var(--rosa-oscuro));
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
        font-size: 0.95rem;
        width: 100%;
        transition: all 0.2s;
      }
      .btn-primary-rosa:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(219, 39, 119, 0.3);
        color: white;
      }
      .punto {
        width: 8px;
        height: 8px;
        background: var(--rosa);
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
      }
    </style>
  </head>
  <body>
    <div class="card-login">
      <div id="mensajeEdicion"></div>
      <span class="punto"></span
      ><span style="font-size: 0.8rem; color: #9ca3af; font-weight: 500"
        >EDITAR</span
      >
      <h1 class="titulo mt-1">Editar cuenta</h1>
      <p class="subtitulo">Modificá los datos del usuario</p>

      <form id="formEdicion">
        <div class="mb-3">
          <label class="form-label">ID</label>
          <input
            type="number"
            id="id"
            name="id"
            class="form-control"
            placeholder="Ingrese ID"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            class="form-control"
            placeholder="Nombre completo"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input
            type="text"
            id="usuario"
            name="usuario"
            class="form-control"
            placeholder="Usuario"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input
            type="password"
            id="clave"
            name="clave"
            class="form-control"
            placeholder="••••••••"
            required
          />
        </div>
        <div class="mb-4">
          <label class="form-label">Estado</label>
          <select id="activo" name="activo" class="form-select">
            <option value="1">Activo</option>
            <option value="0">Inactivo</option>
          </select>
        </div>
        <button type="submit" class="btn-primary-rosa">Guardar cambios</button>
      </form>
    </div>

    <script>
      $("#formEdicion").submit(function (e) {
        e.preventDefault();

        $.post(
          "sistema/include/usuario/edicion_ajax.php",
          {
            id: $("#id").val(),
            nombre: $("#nombre").val(),
            usuario: $("#usuario").val(),
            clave: $("#clave").val(),
            activo: $("#activo").val(),
          },
          function (rta) {
            if (rta.ok) {
              $("#mensajeEdicion").html(
                '<div class="alert alert-success rounded-3 py-2">¡Usuario editado correctamente! 🌸</div>',
              );
            } else {
              $("#mensajeEdicion").html(
                `<div class="alert alert-danger rounded-3 py-2">${rta.mensaje}</div>`,
              );
            }
          },
        );
      });
    </script>
  </body>
</html>
