<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscar cuenta</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
      :root {
        --rosa: #f472b6;
        --rosa-oscuro: #db2777;
        --crema: #fff7f0;
      }
      body {
        background: var(--crema);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: radial-gradient(
          circle at 30% 70%,
          #fce7f3 0%,
          transparent 50%
        );
      }
      .card-login {
        background: white;
        border-radius: 24px;
        padding: 40px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 8px 40px rgba(244, 114, 182, 0.15);
        border: 1px solid #fce7f3;
        animation: fadeUp 0.5s ease;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .titulo {
        font-family: "Playfair Display", serif;
        color: #1e1e2e;
        font-size: 2rem;
        margin-bottom: 4px;
      }
      .subtitulo {
        color: #9ca3af;
        font-size: 0.9rem;
        margin-bottom: 28px;
      }
      .form-label {
        font-weight: 500;
        font-size: 0.85rem;
        color: #1e1e2e;
      }
      .form-control,
      .form-select {
        border: 1.5px solid #e5e7eb;
        border-radius: 12px;
        padding: 11px 14px;
        font-size: 0.92rem;
        background: #fafafa;
        transition: all 0.2s;
      }
      .form-control:focus,
      .form-select:focus {
        border-color: var(--rosa);
        box-shadow: 0 0 0 3px rgba(244, 114, 182, 0.15);
        background: white;
      }
      .btn-primary-rosa {
        background: linear-gradient(135deg, var(--rosa), var(--rosa-oscuro));
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
        font-size: 0.95rem;
        width: 100%;
        transition: all 0.2s;
      }
      .btn-primary-rosa:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(219, 39, 119, 0.3);
        color: white;
      }
      .punto {
        width: 8px;
        height: 8px;
        background: var(--rosa);
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
      }
      .table {
        border-radius: 12px;
        overflow: hidden;
      }
      .table thead th {
        background: #fce7f3;
        color: var(--rosa-oscuro);
        font-weight: 600;
        border: none;
      }
      .table tbody td {
        border-color: #fce7f3;
      }
    </style>
  </head>
  <body>
    <div class="card-login">
      <div id="resultadoBusqueda"></div>
      <span class="punto"></span
      ><span style="font-size: 0.8rem; color: #9ca3af; font-weight: 500"
        >USUARIOS</span
      >
      <h1 class="titulo mt-1">Buscar cuenta</h1>
      <p class="subtitulo">Buscá un usuario por campo y valor</p>

      <form id="formBusqueda">
        <div class="mb-3">
          <label class="form-label">Campo</label>
          <select name="campo" id="campo" class="form-select" required>
            <option value="">Seleccionar</option>
            <option value="nombre">Nombre</option>
            <option value="usuario">Usuario</option>
            <option value="id">ID</option>
          </select>
        </div>
        <div class="mb-4">
          <label class="form-label">Valor a buscar</label>
          <input
            type="text"
            name="busqueda"
            id="busqueda"
            class="form-control"
            placeholder="Ingrese valor"
            required
          />
        </div>
        <button type="submit" class="btn-primary-rosa">Buscar</button>
      </form>

      <div id="tablaResultados" class="mt-4"></div>
    </div>

    <script>
      $("#formBusqueda").submit(function (e) {
        e.preventDefault();

        $.post(
          "sistema/include/usuario/buscar_ajax.php",
          {
            campo: $("#campo").val(),
            busqueda: $("#busqueda").val(),
          },
          function (rta) {
            if (rta.code == 200) {
              $("#resultadoBusqueda").html(
                '<div class="alert alert-success rounded-3 py-2">¡Resultados encontrados!</div>',
              );
              let filas = "";
              rta.resultados.forEach(function (usuario) {
                filas += `<tr>
              <td>${usuario.id}</td>
              <td>${usuario.nombre}</td>
              <td>${usuario.usuario}</td>
              <td>${usuario.activo == 1 ? "✅ Activo" : "❌ Inactivo"}</td>
            </tr>`;
              });
              $("#tablaResultados").html(`
            <table class="table table-bordered">
              <thead><tr><th>ID</th><th>Nombre</th><th>Usuario</th><th>Estado</th></tr></thead>
              <tbody>${filas}</tbody>
            </table>
          `);
            } else {
              $("#resultadoBusqueda").html(
                `<div class="alert alert-danger rounded-3 py-2">${rta.msj}</div>`,
              );
              $("#tablaResultados").html("");
            }
          },
        );
      });
    </script>
  </body>
</html>
