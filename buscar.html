<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscar cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous" />
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body class="d-flex justify-content-center align-items-center vh-100">
    <div style="border: 1px solid #ccc; max-width: 400px; margin: 50px auto; padding: 20px; border-radius: 10px;"
        class="container">
            <form method="GET" id="formBusqueda" action="sistema/include/usuario/buscar_ajax.php">
                <div id="resultadoBusqueda"></div>
                <h1 class="mt-0">Buscar cuenta</h1>

                <div class="mb-3">
                    <label class="form-label">Campo</label>
                    <select name="campo" id="campo" class="form-control" required>
                        <option value="">Seleccionar</option>
                        <option value="nombre">Nombre</option>
                        <option value="usuario">Usuario</option>
                        <option value="id">ID</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Valor a buscar</label>
                    <input type="text" name="busqueda" id="busqueda" class="form-control" placeholder="Ingrese valor" required />
                </div>

                <button class="btn btn-primary w-100 mb-3">Buscar</button>

            </form>

    </div>
</body>

</html>
<script>
    $("#formBusqueda").submit(function (e) { // capturamos el evento submit del formulario
        e.preventDefault(); // evitamos que se recargue la página

        $.post(
            "sistema/include/usuario/buscar_ajax.php", // enviamos los datos del formulario a buscar_ajax.php
            {
                campo: $("#campo").val(), // obtenemos el campo del formulario
                busqueda: $("#busqueda").val(), // obtenemos el valor a buscar del formulario
            },
            function (rta) { // función que se ejecuta cuando recibimos la respuesta de buscar_ajax.php
                if (rta.code == 200) { // si el código de respuesta es 200, mostramos los resultados
                    $("#resultadoBusqueda").html( // mostramos los resultados en el div resultadoBusqueda
                    '<div class="alert alert-success" role="alert">Resultados encontrados:</div>' + // mostramos un mensaje de éxito
                    '<table class="table table-bordered"><thead><tr><th>ID</th><th>Nombre</th><th>Usuario</th><th>Activo</th></tr></thead><tbody id="resultadosTabla"></tbody></table>' ); 
                    // mostramos una tabla con los resultados
                    rta.resultados.forEach(function(usuario) { // iteramos sobre los resultados y los agregamos a la tabla
                        $("#resultadosTabla").append( // agregamos una fila a la tabla por cada resultado
                            '<tr>' +
                                '<td>' + usuario.id + '</td>' +
                                '<td>' + usuario.nombre + '</td>' +
                                '<td>' + usuario.usuario + '</td>' +
                                '<td>' + usuario.activo + '</td>' +
                            '</tr>'
                        );
                    });
                } else {
                    $("#resultadoBusqueda").html('<div class="alert alert-danger" role="alert">' + rta.msj + '</div>'); // mostramos un mensaje de error
                }
                    
                }
        );
        });
    
</script>
